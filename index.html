<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>눈사람</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100vw;
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(to bottom,#87ceeb 0%, #dff6ff 55%, #ffffff 100%);
      font-family:Arial,sans-serif;
    }

    /* 눈 내리기 */
    .snow{
      position:absolute;
      width:8px;
      height:8px;
      background:white;
      border-radius:50%;
      opacity:0.9;
      animation:fall linear infinite;
    }

    @keyframes fall{
      from{
        transform:translateY(-100vh);
      }
      to{
        transform:translateY(100vh);
      }
    }

    .scene{
      position:relative;
      width:500px;
      height:650px;
    }

    /* 눈사람 몸 */
    .snowman{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:60px;
    }

    .body-bottom{
      width:260px;
      height:260px;
      background:white;
      border-radius:50%;
      border:4px solid #ddd;
      position:relative;
      box-shadow:
        inset -15px -10px 25px rgba(0,0,0,0.08);
    }

    .body-middle{
      width:190px;
      height:190px;
      background:white;
      border-radius:50%;
      border:4px solid #ddd;
      position:absolute;
      left:35px;
      top:-145px;
      box-shadow:
        inset -10px -10px 20px rgba(0,0,0,0.07);
    }

    .head{
      width:140px;
      height:140px;
      background:white;
      border-radius:50%;
      border:4px solid #ddd;
      position:absolute;
      left:25px;
      top:-120px;
      box-shadow:
        inset -8px -8px 15px rgba(0,0,0,0.06);
    }

    /* 눈 */
    .eye{
      width:12px;
      height:12px;
      background:#222;
      border-radius:50%;
      position:absolute;
      top:48px;
    }

    .eye.left{
      left:38px;
    }

    .eye.right{
      right:38px;
    }

    /* 코 */
    .nose{
      position:absolute;
      top:62px;
      left:63px;
      width:0;
      height:0;
      border-top:10px solid transparent;
      border-bottom:10px solid transparent;
      border-left:40px solid orange;
      transform:rotate(3deg);
    }

    /* 입 */
    .mouth{
      position:absolute;
      width:60px;
      height:25px;
      border-bottom:4px solid #444;
      border-radius:0 0 50px 50px;
      left:38px;
      top:88px;
    }

    /* 단추 */
    .button{
      width:16px;
      height:16px;
      background:#222;
      border-radius:50%;
      position:absolute;
      left:87px;
    }

    .b1{ top:40px; }
    .b2{ top:80px; }
    .b3{ top:120px; }

    /* 팔 */
    .arm{
      position:absolute;
      width:120px;
      height:6px;
      background:#6b4423;
      top:60px;
      border-radius:10px;
    }

    .arm.left{
      left:-100px;
      transform:rotate(-20deg);
    }

    .arm.right{
      right:-100px;
      transform:rotate(20deg);
    }

    /* 모자 */
    .hat-top{
      position:absolute;
      width:90px;
      height:90px;
      background:#111;
      top:-78px;
      left:25px;
      border-radius:8px 8px 0 0;
    }

    .hat-brim{
      position:absolute;
      width:130px;
      height:16px;
      background:#111;
      top:5px;
      left:5px;
      border-radius:10px;
    }

    /* 목도리 */
    .scarf{
      position:absolute;
      width:120px;
      height:22px;
      background:#d62828;
      border-radius:12px;
      top:10px;
      left:35px;
    }

    .scarf-tail{
      position:absolute;
      width:24px;
      height:90px;
      background:#d62828;
      left:95px;
      top:15px;
      border-radius:0 0 12px 12px;
    }

    /* 바닥 눈 */
    .ground{
      position:absolute;
      width:100%;
      height:120px;
      background:white;
      bottom:0;
      border-top:4px solid #e8f7ff;
    }

    .title{
      position:absolute;
      top:25px;
      width:100%;
      text-align:center;
      color:white;
      font-size:42px;
      font-weight:bold;
      text-shadow:0 0 12px rgba(0,0,0,0.35);
      letter-spacing:3px;
    }

  </style>
</head>
<body>

  <!-- 눈 -->
  <div class="snow" style="left:5%; animation-duration:7s;"></div>
  <div class="snow" style="left:15%; animation-duration:10s;"></div>
  <div class="snow" style="left:28%; animation-duration:6s;"></div>
  <div class="snow" style="left:40%; animation-duration:8s;"></div>
  <div class="snow" style="left:52%; animation-duration:11s;"></div>
  <div class="snow" style="left:63%; animation-duration:7s;"></div>
  <div class="snow" style="left:74%; animation-duration:9s;"></div>
  <div class="snow" style="left:88%; animation-duration:6s;"></div>

  <div class="scene">

    <div class="title">☃ WINTER SNOWMAN ☃</div>

    <div class="snowman">

      <div class="body-bottom">

        <div class="body-middle">

          <div class="scarf"></div>
          <div class="scarf-tail"></div>

          <div class="arm left"></div>
          <div class="arm right"></div>

          <div class="button b1"></div>
          <div class="button b2"></div>
          <div class="button b3"></div>

          <div class="head">

            <div class="hat-top"></div>
            <div class="hat-brim"></div>

            <div class="eye left"></div>
            <div class="eye right"></div>

            <div class="nose"></div>

            <div class="mouth"></div>

          </div>

        </div>

      </div>

    </div>

    <div class="ground"></div>

  </div>

</body>
</html>
